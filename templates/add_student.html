<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mark Attendance | Attendance Tracker</title>
  <!-- Bootstrap + Font Awesome -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="bg-light">

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow">
  <div class="container-fluid">
    <a class="navbar-brand fw-bold" href="/">📊 Attendance Tracker</a>
  </div>
</nav>

<!-- Page Header -->
<header class="bg-light text-center py-4">
  <h2 class="fw-bold">📝 Mark Attendance</h2>
  <p class="text-muted">Enter register number and mark attendance</p>
</header>

<!-- Attendance Form -->
<div class="container mt-4">
  <form method="POST" class="card shadow-lg border-0 rounded-4 p-4">
    <!-- Date -->
    <div class="mb-3">
      <label class="form-label"><i class="fa fa-calendar"></i> Date</label>
      <input type="date" id="attendanceDate" name="date" class="form-control" required onchange="showDay()">
      <small id="dayDisplay" class="text-muted fw-bold"></small>
    </div>

    <!-- Register Number -->
    <div class="mb-3">
      <label class="form-label"><i class="fa fa-id-card"></i> Register Number</label>
      <input type="text" id="registerNumber" name="register_number" class="form-control" placeholder="Enter register number" required onblur="fetchStudentInfo()">
    </div>

    <!-- Student Info (Auto-filled) -->
    <div id="studentInfo" class="alert alert-info d-none">
      <p><strong>Name:</strong> <span id="studentName"></span></p>
      <p><strong>Current Attendance %:</strong> <span id="attendancePercent"></span></p>
    </div>

    <!-- Attendance Status -->
    <div class="mb-3">
      <label class="form-label"><i class="fa fa-check-circle"></i> Status</label>
      <div class="form-check">
        <input class="form-check-input" type="radio" name="status" value="Present" required>
        <label class="form-check-label text-success fw-bold">Present ✅</label>
      </div>
      <div class="form-check">
        <input class="form-check-input" type="radio" name="status" value="Absent" required>
        <label class="form-check-label text-danger fw-bold">Absent ❌</label>
      </div>
    </div>

    <!-- Submit Button -->
    <div class="d-grid mb-3">
      <button type="submit" class="btn btn-success btn-lg"><i class="fa fa-save"></i> Save Attendance</button>
    </div>

    <!-- Back Button -->
    <div class="d-grid">
      <a href="/" class="btn btn-outline-secondary btn-lg"><i class="fa fa-arrow-left"></i> Back to Home</a>
    </div>
  </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<!-- NEW JavaScript -->
<script>
function showDay() {
  const dateInput = document.getElementById("attendanceDate").value;
  if (dateInput) {
    const day = new Date(dateInput).toLocaleDateString("en-US", { weekday: "long" });
    document.getElementById("dayDisplay").innerText = "Selected Day: " + day;
  }
}

// Simulated student info fetch (replace with backend AJAX call)
function fetchStudentInfo() {
  const regNo = document.getElementById("registerNumber").value;
  if (regNo) {
    // Example: Replace with Flask route that returns student info
    // For demo, hardcoded values
    document.getElementById("studentName").innerText = "John Doe";
    document.getElementById("attendancePercent").innerText = "85%";
    document.getElementById("studentInfo").classList.remove("d-none");
  }
}
</script>
</body>
</html>
