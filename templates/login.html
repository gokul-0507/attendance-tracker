<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login | Attendance Tracker</title>
  <!-- Bootstrap + Font Awesome -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="bg-light d-flex align-items-center justify-content-center vh-100">

<!-- Centered Login Card -->
<div class="card shadow-lg border-0 rounded-4 p-4" style="max-width: 400px; width: 100%;">
  <div class="card-body">
    <!-- Title -->
    <h3 class="text-center fw-bold mb-4">🔐 Secure Login</h3>

    <!-- Login Form -->
    <form method="POST">
      <!-- Username -->
      <div class="mb-3">
        <label class="form-label"><i class="fa fa-user"></i> Username</label>
        <input type="text" name="username" class="form-control" placeholder="Enter your username" required>
      </div>
      <!-- Password -->
      <div class="mb-3">
        <label class="form-label"><i class="fa fa-lock"></i> Password</label>
        <input type="password" name="password" class="form-control" placeholder="Enter your password" required>
      </div>
      <!-- Login Button -->
      <div class="d-grid mb-3">
        <button type="submit" class="btn btn-primary btn-lg"><i class="fa fa-sign-in-alt"></i> Login</button>
      </div>
    </form>

    <!-- NEW: Back Button -->
    <div class="d-grid mb-2">
      <a href="/" class="btn btn-outline-secondary btn-lg"><i class="fa fa-arrow-left"></i> Back to Home</a>
    </div>

    <!-- Extra Links -->
    <div class="text-center mt-3">
      <a href="#" class="text-decoration-none">Forgot Password?</a>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
